<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lumi — Habit & Goals Dashboard</title>
<style>
:root{
  --accent:#7c5cff; --accent-2:#9d8bff; --accent-soft:rgba(124,92,255,.14);
  --radius:18px; --radius-sm:12px;
  --ease:cubic-bezier(.22,1,.36,1);
  --font:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
}
[data-theme="dark"]{
  --bg:#0c0d12; --bg-2:#13141b; --surface:#16171f; --surface-2:#1c1e28;
  --border:rgba(255,255,255,.07); --border-strong:rgba(255,255,255,.12);
  --text:#f3f4f8; --text-2:#a4a7b5; --text-3:#6c6f7e;
  --shadow:0 10px 40px -12px rgba(0,0,0,.6);
  --ring-track:rgba(255,255,255,.08);
}
[data-theme="light"]{
  --bg:#f6f7fb; --bg-2:#eef0f6; --surface:#ffffff; --surface-2:#f7f8fc;
  --border:rgba(15,18,40,.08); --border-strong:rgba(15,18,40,.14);
  --text:#15161c; --text-2:#585b6b; --text-3:#9094a3;
  --shadow:0 10px 40px -16px rgba(20,22,50,.22);
  --ring-track:rgba(15,18,40,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font); background:var(--bg); color:var(--text);
  -webkit-font-smoothing:antialiased; transition:background .5s var(--ease),color .5s var(--ease);
  overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
::selection{background:var(--accent-soft)}
/* layout */
.app{display:grid;grid-template-columns:248px 1fr;min-height:100vh}
.sidebar{
  position:sticky;top:0;height:100vh;padding:26px 18px;
  background:var(--bg-2);border-right:1px solid var(--border);
  display:flex;flex-direction:column;gap:6px;transition:background .5s var(--ease)
}
.brand{display:flex;align-items:center;gap:11px;padding:6px 10px 22px}
.brand-logo{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 6px 18px -4px var(--accent);}
.brand-logo svg{width:20px;height:20px}
.brand h1{font-size:18px;font-weight:700;letter-spacing:-.02em}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 12px;border-radius:12px;
  color:var(--text-2);font-size:14.5px;font-weight:500;transition:.18s var(--ease);position:relative}
.nav-item svg{width:19px;height:19px;stroke-width:1.9}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:var(--accent-soft);color:var(--accent-2)}
[data-theme=light] .nav-item.active{color:var(--accent)}
.nav-item.active::before{content:'';position:absolute;left:-18px;top:50%;transform:translateY(-50%);
  width:3px;height:20px;border-radius:0 3px 3px 0;background:var(--accent)}
.sidebar-foot{margin-top:auto;padding:14px 12px;border-radius:14px;background:var(--surface);
  font-size:12.5px;color:var(--text-3);line-height:1.5}
.main{padding:30px 38px 60px;max-width:1180px;width:100%}
/* header */
.topbar{display:flex;align-items:center;justify-content:space-between;gap:16px;margin-bottom:30px}
.greeting h2{font-size:25px;font-weight:750;letter-spacing:-.03em}
.greeting p{color:var(--text-2);font-size:14.5px;margin-top:3px}
.top-actions{display:flex;align-items:center;gap:10px}
.icon-btn{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;
  background:var(--surface);border:1px solid var(--border);color:var(--text-2);transition:.2s var(--ease)}
.icon-btn:hover{color:var(--text);border-color:var(--border-strong);transform:translateY(-1px)}
.icon-btn svg{width:19px;height:19px}
.btn-primary{display:flex;align-items:center;gap:8px;padding:0 18px;height:42px;border-radius:12px;
  font-size:14px;font-weight:600;color:#fff;background:linear-gradient(135deg,var(--accent),var(--accent-2));
  box-shadow:0 8px 22px -8px var(--accent);transition:.2s var(--ease)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 12px 26px -8px var(--accent)}
.btn-primary:active{transform:translateY(0) scale(.98)}
.btn-primary svg{width:18px;height:18px;stroke-width:2.4}
/* stat row */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:26px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px;
  position:relative;overflow:hidden;transition:.25s var(--ease)}
.stat:hover{transform:translateY(-3px);box-shadow:var(--shadow);border-color:var(--border-strong)}
.stat-label{font-size:12.5px;color:var(--text-2);font-weight:500;display:flex;align-items:center;gap:7px}
.stat-label svg{width:15px;height:15px}
.stat-value{font-size:30px;font-weight:760;letter-spacing:-.03em;margin-top:9px;line-height:1}
.stat-value small{font-size:15px;color:var(--text-3);font-weight:600}
.stat-flame{position:absolute;right:14px;top:14px;font-size:22px;animation:flicker 1.8s ease-in-out infinite}
@keyframes flicker{0%,100%{transform:scale(1) rotate(-3deg)}50%{transform:scale(1.13) rotate(3deg)}}
/* sections */
.section{margin-bottom:30px;opacity:0;transform:translateY(14px);animation:rise .6s var(--ease) forwards}
.section:nth-child(2){animation-delay:.05s}.section:nth-child(3){animation-delay:.1s}
.section:nth-child(4){animation-delay:.15s}
@keyframes rise{to{opacity:1;transform:none}}
.section-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
.section-head h3{font-size:16.5px;font-weight:680;letter-spacing:-.02em}
.section-head span{font-size:13px;color:var(--text-3)}
/* habit grid */
.habit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:16px}
.habit-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;cursor:pointer;transition:.25s var(--ease);position:relative;overflow:hidden}
.habit-card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--border-strong)}
.habit-card.done{border-color:color-mix(in srgb,var(--hc) 45%,transparent)}
.habit-card::after{content:'';position:absolute;inset:0;background:radial-gradient(120% 80% at 100% 0,var(--hc-soft),transparent 60%);
  opacity:0;transition:.3s var(--ease);pointer-events:none}
.habit-card:hover::after{opacity:1}
.habit-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px}
.habit-emoji{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;font-size:23px;
  background:var(--hc-soft)}
.habit-ring{position:relative;width:54px;height:54px}
.habit-ring svg{transform:rotate(-90deg)}
.habit-ring-label{position:absolute;inset:0;display:grid;place-items:center;font-size:12.5px;font-weight:700}
.habit-name{font-size:16px;font-weight:650;letter-spacing:-.02em;margin-bottom:4px}
.habit-meta{font-size:12.5px;color:var(--text-2);display:flex;align-items:center;gap:6px}
.habit-foot{display:flex;align-items:center;justify-content:space-between;margin-top:17px}
.streak-chip{display:flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--text-2)}
.check-btn{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
  border:1.6px solid var(--border-strong);color:var(--text-3);transition:.22s var(--ease)}
.check-btn:hover{border-color:var(--hc);color:var(--hc)}
.check-btn svg{width:18px;height:18px;stroke-width:3;transition:.2s var(--ease)}
.check-btn.on{background:var(--hc);border-color:var(--hc);color:#fff;animation:pop .35s var(--ease)}
@keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.22)}100%{transform:scale(1)}}
/* heatmap */
.heatmap-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px}
.heatmap{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,1fr);gap:5px;overflow-x:auto;padding-bottom:4px}
.hm-cell{width:15px;height:15px;border-radius:4px;background:var(--ring-track);transition:.18s var(--ease)}
.hm-cell:hover{transform:scale(1.28);outline:2px solid var(--accent)}
.hm-legend{display:flex;align-items:center;gap:7px;justify-content:flex-end;margin-top:14px;font-size:12px;color:var(--text-3)}
.hm-legend .hm-cell{width:13px;height:13px}
/* empty */
.empty{text-align:center;padding:64px 20px;border:1.6px dashed var(--border-strong);border-radius:var(--radius);color:var(--text-2)}
.empty .em{font-size:46px;margin-bottom:14px;animation:bob 3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.empty h3{font-size:18px;color:var(--text);font-weight:680;margin-bottom:6px}
.empty p{font-size:14px;max-width:340px;margin:0 auto 20px}
/* modal */
.overlay{position:fixed;inset:0;background:rgba(5,6,10,.55);backdrop-filter:blur(6px);
  display:grid;place-items:center;z-index:60;opacity:0;pointer-events:none;transition:.28s var(--ease);padding:20px}
.overlay.show{opacity:1;pointer-events:auto}
.modal{width:100%;max-width:460px;background:var(--surface);border:1px solid var(--border-strong);
  border-radius:22px;padding:26px;box-shadow:var(--shadow);transform:translateY(24px) scale(.96);transition:.32s var(--ease)}
.overlay.show .modal{transform:none}
.modal h3{font-size:19px;font-weight:720;letter-spacing:-.02em;margin-bottom:20px}
.field{margin-bottom:18px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:8px}
.field input{width:100%;height:46px;padding:0 14px;border-radius:12px;font-size:15px;color:var(--text);
  background:var(--surface-2);border:1.6px solid var(--border);transition:.2s var(--ease);font-family:inherit}
.field input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft)}
.field input.err{border-color:#ff5a6a;box-shadow:0 0 0 4px rgba(255,90,106,.16)}
.err-msg{font-size:12px;color:#ff7884;margin-top:6px;display:none}
.err-msg.show{display:block}
.picker{display:flex;flex-wrap:wrap;gap:8px}
.pick{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:20px;
  background:var(--surface-2);border:1.6px solid var(--border);transition:.18s var(--ease)}
.pick:hover{transform:translateY(-2px)}
.pick.sel{border-color:var(--accent);background:var(--accent-soft);transform:translateY(-2px)}
.swatch{width:34px;height:34px;border-radius:50%;border:3px solid transparent;transition:.18s var(--ease)}
.swatch:hover{transform:scale(1.12)}
.swatch.sel{border-color:var(--text);transform:scale(1.12)}
.modal-foot{display:flex;gap:10px;margin-top:24px}
.btn-ghost{flex:1;height:46px;border-radius:12px;font-size:14px;font-weight:600;color:var(--text-2);
  background:var(--surface-2);border:1px solid var(--border);transition:.2s var(--ease)}
.btn-ghost:hover{color:var(--text);border-color:var(--border-strong)}
.btn-save{flex:1.4;height:46px;border-radius:12px;font-size:14px;font-weight:650;color:#fff;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:0 8px 22px -8px var(--accent);transition:.2s var(--ease)}
.btn-save:hover{transform:translateY(-1px)}
.btn-del{margin-top:14px;width:100%;height:42px;border-radius:12px;font-size:13.5px;font-weight:600;
  color:#ff7884;background:rgba(255,90,106,.08);border:1px solid rgba(255,90,106,.2);transition:.2s var(--ease)}
.btn-del:hover{background:rgba(255,90,106,.16)}
/* detail view */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.mini-stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 20px}
.mini-stat .l{font-size:12.5px;color:var(--text-2);font-weight:500}
.mini-stat .v{font-size:26px;font-weight:740;letter-spacing:-.03em;margin-top:7px}
.bars{display:flex;align-items:flex-end;gap:7px;height:140px;padding-top:10px}
.bar{flex:1;border-radius:7px 7px 3px 3px;background:linear-gradient(180deg,var(--accent),var(--accent-2));
  min-height:5px;transition:height .6s var(--ease);position:relative}
.bar span{position:absolute;bottom:-22px;left:0;right:0;text-align:center;font-size:11px;color:var(--text-3)}
.back-btn{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:600;color:var(--text-2);margin-bottom:18px;transition:.18s}
.back-btn:hover{color:var(--text)}
.back-btn svg{width:17px;height:17px}
/* toast */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--surface);
  border:1px solid var(--border-strong);border-radius:14px;padding:13px 20px;font-size:14px;font-weight:550;
  box-shadow:var(--shadow);z-index:80;transition:.4s var(--ease);display:flex;align-items:center;gap:10px}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast .dot{width:9px;height:9px;border-radius:50%;background:#3ddc97}
canvas#confetti{position:fixed;inset:0;pointer-events:none;z-index:90}
.hide{display:none!important}
@media(max-width:860px){
  .app{grid-template-columns:1fr}
  .sidebar{position:fixed;bottom:0;top:auto;height:auto;width:100%;flex-direction:row;
    padding:10px;border-right:none;border-top:1px solid var(--border);z-index:50;justify-content:space-around}
  .brand,.sidebar-foot{display:none}
  .nav-item.active::before{display:none}
  .nav-item span{display:none}
  .main{padding:22px 18px 110px}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .detail-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v2M12 19v2M5 12H3M21 12h-2M6 6l-1.4-1.4M19.4 19.4 18 18M18 6l1.4-1.4M4.6 19.4 6 18"/><circle cx="12" cy="12" r="4"/></svg></div>
      <h1>Lumi</h1>
    </div>
    <button class="nav-item active" data-view="dashboard"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="9" rx="1.5"/><rect x="14" y="3" width="7" height="5" rx="1.5"/><rect x="14" y="12" width="7" height="9" rx="1.5"/><rect x="3" y="16" width="7" height="5" rx="1.5"/></svg><span>Дашборд</span></button>
    <button class="nav-item" data-view="stats"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-4 3 3 5-7"/></svg><span>Статистика</span></button>
    <button class="nav-item" data-view="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>Настройки</span></button>
    <div class="sidebar-foot">Совет дня 💡<br>Маленький шаг каждый день важнее редких рывков.</div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="greeting">
        <h2 id="greet">Привет 👋</h2>
        <p id="subgreet">Загружаем твой день…</p>
      </div>
      <div class="top-actions">
        <button class="icon-btn" id="themeBtn" title="Сменить тему"></button>
        <button class="btn-primary" id="addBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>Новая привычка</button>
      </div>
    </div>
    <div id="viewRoot"></div>
  </main>
</div>

<div class="overlay" id="overlay">
  <div class="modal" id="modal"></div>
</div>
<div class="toast" id="toast"><span class="dot"></span><span id="toastMsg"></span></div>
<canvas id="confetti"></canvas>
<script src="app.js"></script>
</body>
</html>
